[build]
  command = "npm run build"
  publish = "deploy"
  functions = "netlify/functions"

# SPA fallback - only for GET (not POST for forms)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {Method = ["GET"]}

# Also handle POST to root for Netlify Forms
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = false
  conditions = {Method = ["GET"]}
